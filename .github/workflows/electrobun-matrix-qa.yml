name: Electrobun Matrix QA

on:
  push:
    branches:
      - "feature/eliza-home"
  workflow_dispatch:

concurrency:
  group: electrobun-matrix-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  BUN_VERSION: "1.3.9"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x64
            os: linux
            runner: ubuntu-latest
            artifact_name: linux-x64
          - name: Windows x64
            os: windows
            runner: windows-2022
            artifact_name: windows-x64
          - name: macOS Apple Silicon
            os: macos
            runner: macos-14
            artifact_name: macos-arm64
          - name: macOS Intel
            os: macos
            runner: macos-13
            artifact_name: macos-x64

    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-electrobun-qa-${{ matrix.platform.artifact_name }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-electrobun-qa-${{ matrix.platform.artifact_name }}-

      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Cache local electrobun core downloads
        uses: actions/cache@v4
        with:
          path: apps/app/electrobun/node_modules/electrobun/.cache
          key: electrobun-core-qa-${{ matrix.platform.artifact_name }}-${{ hashFiles('apps/app/electrobun/package.json') }}
          restore-keys: electrobun-core-qa-${{ matrix.platform.artifact_name }}-

      - name: Ensure Windows rcedit binary is available for Electrobun
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $electrobunDir = Join-Path $PWD "apps/app/electrobun/node_modules/electrobun"
          $resolvedElectrobunDir = node -e @'
            const fs = require("node:fs");
            const packageDir = process.argv[1];
            try {
              process.stdout.write(fs.realpathSync(packageDir));
            } catch (error) {
              process.stdout.write(packageDir);
            }
          '@ $electrobunDir
          if ([string]::IsNullOrWhiteSpace("$resolvedElectrobunDir")) {
            $resolvedElectrobunDir = $electrobunDir
          }
          $globalNodeModules = Join-Path $env:USERPROFILE ".bun\install\global\node_modules"
          $globalRceditDir = Join-Path $globalNodeModules "rcedit"
          $globalRceditExe = Join-Path $globalRceditDir "bin\rcedit-x64.exe"

          if (-not (Test-Path $globalRceditExe)) {
            bun install -g "rcedit@4.0.1"
          }

          $resolvedRceditDir = Join-Path $resolvedElectrobunDir "node_modules\rcedit"
          $resolvedRceditExe = Join-Path $resolvedRceditDir "bin\rcedit-x64.exe"
          if (-not (Test-Path $resolvedRceditExe)) {
            $resolvedNodeModulesDir = Split-Path -Parent $resolvedRceditDir
            New-Item -ItemType Directory -Force -Path $resolvedNodeModulesDir | Out-Null
            if (Test-Path $resolvedRceditDir) {
              Remove-Item -Recurse -Force $resolvedRceditDir
            }
            Copy-Item -Recurse -Force $globalRceditDir $resolvedNodeModulesDir
          }

          if (-not (Test-Path $resolvedRceditExe)) {
            Write-Error "rcedit-x64.exe is still missing at $resolvedRceditExe"
            exit 1
          }

      - name: Pre-extract electrobun native CLI on Windows
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $electrobunDir = Join-Path $PWD "apps/app/electrobun/node_modules/electrobun"
          $cacheDir = Join-Path $electrobunDir ".cache"
          $binDir = Join-Path $electrobunDir "bin"
          $cliBinary = Join-Path $cacheDir "electrobun.exe"
          $binBinary = Join-Path $binDir "electrobun.exe"

          if (Test-Path $binBinary) {
            Write-Host "electrobun CLI already present at $binBinary"
            exit 0
          }

          $version = (Get-Content (Join-Path $electrobunDir "package.json") | ConvertFrom-Json).version
          $assetName = "electrobun-cli-win-x64.tar.gz"
          $releaseApiUrl = "https://api.github.com/repos/blackboardsh/electrobun/releases/tags/v$version"
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "milady-electrobun-matrix-qa"
            Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod -Uri $releaseApiUrl -Headers $headers
          $asset = @($release.assets) | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Could not find $assetName in electrobun release v$version"
            exit 1
          }
          if (-not $asset.digest -or -not $asset.digest.StartsWith("sha256:")) {
            Write-Error "Missing sha256 digest for $assetName"
            exit 1
          }

          $expectedHash = $asset.digest.Substring(7).ToLowerInvariant()
          $tarPath = Join-Path $cacheDir "electrobun-win-x64.tar.gz"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $tarPath -UseBasicParsing
          $actualHash = (Get-FileHash -Path $tarPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            Write-Error "Checksum mismatch: expected $expectedHash got $actualHash"
            exit 1
          }

          & "C:\Windows\System32\tar.exe" -xzf $tarPath -C $cacheDir
          Remove-Item $tarPath -Force
          if (-not (Test-Path $cliBinary)) {
            Write-Error "electrobun.exe not found in $cacheDir after extraction"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item $cliBinary $binBinary -Force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage desktop bundle inputs
        run: node scripts/desktop-build.mjs stage --variant=base --build-whisper

      - name: Build Electrobun app
        run: node scripts/desktop-build.mjs package --env=canary
        env:
          MILADY_ELECTROBUN_NOTARIZE: 0
          ELECTROBUN_SKIP_CODESIGN: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact_name }}-qa
          path: |
            apps/app/electrobun/artifacts/*.dmg
            apps/app/electrobun/artifacts/*.tar.zst
            apps/app/electrobun/artifacts/*.exe
            apps/app/electrobun/artifacts/*.exe.zip
            apps/app/electrobun/artifacts/*.tar.gz
            apps/app/electrobun/artifacts/*-update.json
            apps/app/electrobun/artifacts/*.patch
            apps/app/electrobun/artifacts/*.msix
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
