name: Build & Release (Electrobun) QA

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: "true"
  BUN_VERSION: "1.3.9"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x64
            os: linux
            runner: ubuntu-latest
            artifact_name: linux-x64
          - name: Windows x64
            os: windows
            runner: windows-2022
            artifact_name: windows-x64
          - name: macOS Apple Silicon
            os: macos
            runner: macos-14
            artifact_name: macos-arm64
          - name: macOS Intel
            os: macos
            runner: macos-15-intel
            artifact_name: macos-x64

    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-electrobun-qa-${{ matrix.platform.artifact_name }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-electrobun-qa-${{ matrix.platform.artifact_name }}-

      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Cache local electrobun core downloads
        uses: actions/cache@v4
        with:
          path: apps/app/electrobun/node_modules/electrobun/.cache
          key: electrobun-core-qa-${{ matrix.platform.artifact_name }}-${{ hashFiles('apps/app/electrobun/package.json') }}
          restore-keys: electrobun-core-qa-${{ matrix.platform.artifact_name }}-

      - name: Ensure Windows rcedit binary is available for Electrobun
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $electrobunDir = Join-Path $PWD "apps/app/electrobun/node_modules/electrobun"
          $resolvedElectrobunDir = node -e @'
            const fs = require("node:fs");
            const packageDir = process.argv[1];
            try {
              process.stdout.write(fs.realpathSync(packageDir));
            } catch (error) {
              process.stdout.write(packageDir);
            }
          '@ $electrobunDir
          if ([string]::IsNullOrWhiteSpace("$resolvedElectrobunDir")) {
            $resolvedElectrobunDir = $electrobunDir
          }
          $globalNodeModules = Join-Path $env:USERPROFILE ".bun\install\global\node_modules"
          $globalRceditDir = Join-Path $globalNodeModules "rcedit"
          $globalRceditExe = Join-Path $globalRceditDir "bin\rcedit-x64.exe"

          if (-not (Test-Path $globalRceditExe)) {
            bun install -g "rcedit@4.0.1"
          }

          $resolvedRceditDir = Join-Path $resolvedElectrobunDir "node_modules\rcedit"
          $resolvedRceditExe = Join-Path $resolvedRceditDir "bin\rcedit-x64.exe"
          if (-not (Test-Path $resolvedRceditExe)) {
            $resolvedNodeModulesDir = Split-Path -Parent $resolvedRceditDir
            New-Item -ItemType Directory -Force -Path $resolvedNodeModulesDir | Out-Null
            if (Test-Path $resolvedRceditDir) {
              Remove-Item -Recurse -Force $resolvedRceditDir
            }
            Copy-Item -Recurse -Force $globalRceditDir $resolvedNodeModulesDir
          }

          if (-not (Test-Path $resolvedRceditExe)) {
            Write-Error "rcedit-x64.exe is still missing at $resolvedRceditExe"
            exit 1
          }

      - name: Pre-extract electrobun native CLI on Windows
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $electrobunDir = Join-Path $PWD "apps/app/electrobun/node_modules/electrobun"
          $resolvedElectrobunDir = node -e @'
            const fs = require("node:fs");
            const packageDir = process.argv[1];
            try {
              process.stdout.write(fs.realpathSync(packageDir));
            } catch (error) {
              process.stdout.write(packageDir);
            }
          '@ $electrobunDir
          if ([string]::IsNullOrWhiteSpace("$resolvedElectrobunDir")) {
            $resolvedElectrobunDir = $electrobunDir
          }
          Write-Host "Resolved electrobun package dir: $resolvedElectrobunDir"

          $cacheDir = Join-Path $resolvedElectrobunDir ".cache"
          $binDir = Join-Path $resolvedElectrobunDir "bin"
          $cliBinary = Join-Path $cacheDir "electrobun.exe"
          $binBinary = Join-Path $binDir "electrobun.exe"

          if (Test-Path $binBinary) {
            Write-Host "electrobun CLI already present at $binBinary"
            exit 0
          }

          $version = (Get-Content (Join-Path $resolvedElectrobunDir "package.json") | ConvertFrom-Json).version
          $assetName = "electrobun-cli-win-x64.tar.gz"
          $releaseApiUrl = "https://api.github.com/repos/blackboardsh/electrobun/releases/tags/v$version"
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "milady-electrobun-matrix-qa"
            Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod -Uri $releaseApiUrl -Headers $headers
          $asset = @($release.assets) | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Could not find $assetName in electrobun release v$version"
            exit 1
          }
          if (-not $asset.digest -or -not $asset.digest.StartsWith("sha256:")) {
            Write-Error "Missing sha256 digest for $assetName"
            exit 1
          }

          $expectedHash = $asset.digest.Substring(7).ToLowerInvariant()
          $tarPath = Join-Path $cacheDir "electrobun-win-x64.tar.gz"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $tarPath -UseBasicParsing
          $actualHash = (Get-FileHash -Path $tarPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            Write-Error "Checksum mismatch: expected $expectedHash got $actualHash"
            exit 1
          }

          & "C:\Windows\System32\tar.exe" -xzf $tarPath -C $cacheDir
          Remove-Item $tarPath -Force
          if (-not (Test-Path $cliBinary)) {
            Write-Error "electrobun.exe not found in $cacheDir after extraction"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item $cliBinary $binBinary -Force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage desktop bundle inputs
        run: node scripts/desktop-build.mjs stage --variant=base --build-whisper

      - name: Build Electrobun app
        run: node scripts/desktop-build.mjs package --env=canary
        env:
          MILADY_ELECTROBUN_NOTARIZE: 0
          ELECTROBUN_SKIP_CODESIGN: 1

      - name: Cache Windows embedding model
        if: matrix.platform.os == 'windows'
        uses: actions/cache@v4
        with:
          path: ~/.eliza/models
          key: embedding-model-nomic-embed-text-v1.5-Q4_K_S

      - name: Seed Windows embedding model cache
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $modelsDir = Join-Path $env:USERPROFILE ".eliza\models"
          $modelName = "nomic-embed-text-v1.5.Q4_K_S.gguf"
          $modelRepo = "nomic-ai/nomic-embed-text-v1.5-GGUF"
          $modelPath = Join-Path $modelsDir $modelName

          if (-not (Test-Path $modelPath)) {
            New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
            $url = "https://huggingface.co/$modelRepo/resolve/main/$modelName"
            Write-Host "Downloading Windows embedding model cache seed: $url"
            Invoke-WebRequest -Uri $url -OutFile $modelPath
          }

          Write-Host "Windows embedding model cache ready: $modelPath"

      - name: Smoke test packaged Windows app
        if: matrix.platform.os == 'windows'
        shell: pwsh
        env:
          MILADY_DISABLE_LOCAL_EMBEDDINGS: "1"
          MILADY_TEST_WINDOWS_LAUNCHER_DIR: ${{ runner.temp }}\milady-windows-ui-launcher
          MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE: ${{ runner.temp }}\milady-windows-ui-launcher.txt
        run: |
          Remove-Item $env:MILADY_TEST_WINDOWS_LAUNCHER_DIR -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $env:MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE -Force -ErrorAction SilentlyContinue

          pwsh -File apps/app/electrobun/scripts/smoke-test-windows.ps1

          if (-not (Test-Path $env:MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE)) {
            Write-Error "Smoke test did not emit a reusable Windows launcher path."
            exit 1
          }

          $launcherPath = (Get-Content $env:MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($launcherPath) -or -not (Test-Path $launcherPath)) {
            Write-Error "Reusable Windows launcher path is invalid: $launcherPath"
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "MILADY_TEST_WINDOWS_LAUNCHER_PATH=$launcherPath"
          Write-Host "Reusing packaged Windows launcher for Playwright: $launcherPath"

      - name: Run Windows packaged renderer bootstrap check
        if: matrix.platform.os == 'windows'
        env:
          MILADY_DISABLE_LOCAL_EMBEDDINGS: "1"
        run: |
          cd apps/app
          bunx playwright test --config playwright.electrobun.packaged.config.ts test/electrobun-packaged/electrobun-windows-startup.e2e.spec.ts

      - name: Upload Windows Playwright UI diagnostics
        if: failure() && matrix.platform.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-windows-ui-playwright-diagnostics
          path: apps/app/test-results/**
          if-no-files-found: warn
          retention-days: 14

      - name: Smoke test packaged macOS app
        if: matrix.platform.os == 'macos'
        env:
          SMOKE_DIAGNOSTICS_DIR: ${{ runner.temp }}/milady-smoke-diagnostics
        run: |
          STARTUP_TIMEOUT=420 \
          LIVENESS_TIMEOUT=10 \
          SKIP_BUILD=1 \
          SKIP_SIGNATURE_CHECK=1 \
          bash apps/app/electrobun/scripts/smoke-test.sh

      - name: Upload macOS smoke diagnostics
        if: failure() && matrix.platform.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact_name }}-smoke-diagnostics
          path: |
            ${{ runner.temp }}/milady-smoke-diagnostics/**
            apps/app/electrobun/build/**/wrapper-diagnostics.json
          if-no-files-found: warn
          retention-days: 14

      - name: Stage Windows setup executables
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $artifactsDir = Join-Path $PWD "apps/app/electrobun/artifacts"
          $setupExecutables = Get-ChildItem -Path "apps/app/electrobun/build" -Recurse -File -Filter "*Setup*.exe" -ErrorAction SilentlyContinue
          if (-not $setupExecutables) {
            Write-Warning "No Windows setup executable found under apps/app/electrobun/build"
          } else {
            New-Item -ItemType Directory -Force -Path $artifactsDir | Out-Null
            foreach ($setupExecutable in $setupExecutables) {
              Copy-Item $setupExecutable.FullName -Destination $artifactsDir -Force
              Write-Host "Staged Windows setup executable: $($setupExecutable.Name)"
            }
          }

      - name: Compress Windows executables before upload
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $artifactsDir = Join-Path $PWD "apps/app/electrobun/artifacts"
          if (-not (Test-Path $artifactsDir)) {
            Write-Host "No artifacts directory to compress."
            exit 0
          }
          $exeFiles = Get-ChildItem -Path $artifactsDir -Filter "*.exe" -ErrorAction SilentlyContinue
          foreach ($exe in $exeFiles) {
            $zipPath = $exe.FullName + ".zip"
            Write-Host "Compressing $($exe.Name) -> $($exe.Name).zip"
            Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -CompressionLevel Optimal -Force
            Remove-Item $exe.FullName -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact_name }}
          path: |
            apps/app/electrobun/artifacts/*.dmg
            apps/app/electrobun/artifacts/*.tar.zst
            apps/app/electrobun/artifacts/*.exe
            apps/app/electrobun/artifacts/*.exe.zip
            apps/app/electrobun/artifacts/*.tar.gz
            apps/app/electrobun/artifacts/*-update.json
            apps/app/electrobun/artifacts/*.patch
            apps/app/electrobun/artifacts/*.msix
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

  publish-canary-release:
    name: Publish Electrobun Canary Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref_name == 'feature/eliza-home'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electrobun-*
          merge-multiple: true
          path: ./release-assets

      - name: Publish GitHub prerelease assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="eliza-home-canary"
          TITLE="Eliza Home Canary"
          NOTES_FILE="$(mktemp)"

          {
            echo "Automated canary build from \`${GITHUB_SHA}\`."
            echo
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Branch: ${GITHUB_REF_NAME}"
          } > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease
          fi

          mapfile -t assets < <(
            find ./release-assets -maxdepth 1 -type f \
              \( -name "*.dmg" \
              -o -name "*.app.tar.zst" \
              -o -name "*Milady-canary.tar.zst" \
              -o -name "*Setup*.tar.gz" \
              -o -name "*Setup*.exe.zip" \) \
              | sort
          )
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found under ./release-assets"
            exit 1
          fi

          for asset in "${assets[@]}"; do
            size_bytes="$(stat -c%s "$asset")"
            name="$(basename "$asset")"
            if [[ "$name" == *.exe.zip ]]; then
              if [[ "$size_bytes" -lt 50000 ]]; then
                echo "Refusing to publish unexpectedly tiny Windows setup archive: $name ($size_bytes bytes)"
                exit 1
              fi
              continue
            fi
            if [[ "$size_bytes" -lt 50000000 ]]; then
              echo "Refusing to publish unexpectedly tiny package: $name ($size_bytes bytes)"
              exit 1
            fi
          done

          gh release upload "$TAG" "${assets[@]}" --clobber

      - name: Add release links to run summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="eliza-home-canary"
          RELEASE_URL="$(gh release view "$TAG" --json url --jq .url)"
          {
            echo "## Electrobun Canary Downloads"
            echo
            echo "- Release page: $RELEASE_URL"
            echo "- Tag: \`$TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"
