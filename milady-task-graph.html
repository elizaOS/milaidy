<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milady — Fix Task Graph</title>
<style>
:root{
  --bg:#0d0d10;--surface:#13131a;--surface2:#1a1a24;--border:#2a2a3a;
  --text:#e8e6f0;--muted:#7a788a;--accent:#6ec6ff;
  --red:#ff5e5e;--orange:#ffb86e;--yellow:#ffe066;--green:#6effa5;
  --purple:#b89aff;--pink:#ff6eb0;--blue:#6ec6ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header p{font-size:13px;color:var(--muted)}
.progress-row{display:flex;gap:16px;margin-top:12px;align-items:center;flex-wrap:wrap}
.progress-bar-wrap{flex:1;min-width:200px;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px;transition:width .4s ease}
.progress-label{font-size:13px;font-weight:600;color:var(--green);white-space:nowrap}

/* Stats */
.stats{display:flex;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap}
.stat-pill{font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px}
.stat-total{background:var(--surface2);color:var(--text)}
.stat-phase{background:var(--surface2);color:var(--muted)}
.stat-phase.active{color:var(--accent);border:1px solid #183040}

/* Phase View */
.phase-nav{display:flex;gap:2px;padding:0 24px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto}
.phase-tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.phase-tab:hover{color:var(--text)}
.phase-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.phase-tab .cnt{font-size:11px;margin-left:4px;padding:1px 6px;border-radius:8px;background:var(--surface2)}

/* Content */
.content{max-width:1100px;margin:0 auto;padding:20px 24px}
.phase-panel{display:none}
.phase-panel.active{display:block}

/* Phase Header */
.phase-header{margin-bottom:16px}
.phase-header h2{font-size:16px;font-weight:700;margin-bottom:2px}
.phase-header .phase-desc{font-size:13px;color:var(--muted)}
.phase-header .dep-note{font-size:12px;color:var(--purple);margin-top:4px;font-style:italic}

/* Task Cards */
.task{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:opacity .3s}
.task.done{opacity:.35}
.task.done .task-title{text-decoration:line-through}
.task.blocked{border-left:4px solid var(--muted)}
.task.ready{border-left:4px solid var(--green)}
.task.sev-HIGH{border-left:4px solid var(--red)}
.task.sev-MEDIUM{border-left:4px solid var(--orange)}
.task.sev-LOW{border-left:4px solid var(--yellow)}
.task.done{border-left:4px solid var(--green)!important}

.task-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px}
.task-row input[type=checkbox]{margin-top:3px;accent-color:var(--green);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.task-meta{flex:1;min-width:0}
.task-id{font-size:11px;font-family:'SF Mono',Consolas,monospace;color:var(--muted);margin-bottom:2px}
.task-title{font-size:14px;font-weight:600}
.task-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.b-HIGH{color:var(--red);background:#1e0f0f;border:1px solid #3a1414}
.b-MEDIUM{color:var(--orange);background:#1e150a;border:1px solid #3a2810}
.b-LOW{color:var(--yellow);background:#1a1800;border:1px solid #332e00}
.b-SECURITY{color:var(--pink);background:#1e0e18;border:1px solid #3a1430}
.b-ERROR{color:var(--red);background:#1e0f0f;border:1px solid #3a1414}
.b-LOGIC{color:var(--blue);background:#0e1a24;border:1px solid #183040}
.b-GAP{color:var(--purple);background:#17122a;border:1px solid #2e2050}
.b-UX{color:var(--green);background:#0e1e14;border:1px solid #183028}
.b-FINANCIAL{color:var(--orange);background:#1e150a;border:1px solid #3a2810}
.b-domain{color:var(--accent);background:#0e1a24;border:1px solid #183040;font-weight:500;text-transform:none}
.task-file{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--muted);margin-top:4px;word-break:break-all}
.task-desc{font-size:12px;color:#b0aec0;margin-top:6px;padding:0 14px 10px 40px}

/* Deps */
.task-deps{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.dep-label{font-size:10px;color:var(--muted)}
.dep-tag{font-size:10px;font-family:'SF Mono',Consolas,monospace;padding:1px 6px;border-radius:3px;background:var(--surface2);color:var(--purple);cursor:pointer}
.dep-tag:hover{color:var(--text);background:#2e2050}

/* Fix prompt */
.fix-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--accent);font-weight:500;user-select:none;padding:0 14px 8px 40px}
.fix-toggle .arrow{transition:transform .2s;display:inline-block}
.fix-toggle.open .arrow{transform:rotate(90deg)}
.fix-box{display:none;margin:0 14px 12px 40px;position:relative}
.fix-box.open{display:block}
.fix-box pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-word;color:#c8c6d0;font-family:'SF Mono',Consolas,monospace}
.copy-btn{position:absolute;top:6px;right:6px;padding:3px 8px;font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer}
.copy-btn:hover{background:#2a2a3a}
.copy-btn.copied{background:#0e1e14;border-color:#183028;color:var(--green)}

/* All-tasks view */
.dag-view{padding:20px 24px;max-width:1100px;margin:0 auto}
.dag-phase-group{margin-bottom:24px}
.dag-phase-label{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-left:4px}
.dag-phase-label .arrow-right{color:var(--muted);margin:0 8px}

@media(max-width:768px){.content,.dag-view{padding:12px}.task-desc{padding:0 8px 8px 24px}.fix-toggle{padding:0 8px 6px 24px}.fix-box{margin:0 8px 8px 24px}}
</style>
</head>
<body>

<div class="header">
  <h1>Milady — Fix Task Graph</h1>
  <p>32 atomic tasks derived from full codebase audit, ordered by dependency and severity. Each task is self-contained with a copy-paste fix prompt.</p>
  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
    <div class="progress-label" id="plabel">0 / 32 complete</div>
  </div>
</div>

<div class="phase-nav" id="phase-nav"></div>

<div id="main-content"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  TASK DATA — 32 atomic tasks across 6 phases
// ═══════════════════════════════════════════════════════════════════
const TASKS = [
  // ── Phase 0: Foundational Config Alignment ──
  {id:"T01",phase:0,severity:"HIGH",type:"GAP",domain:"Environment & Ports",title:"Document and unify all port env vars (API_PORT, SERVER_PORT, ELIZA_PORT, MILADY_PORT)",file:"src/actions/wallet-action-shared.ts:9-10, src/actions/install-plugin.ts:16, .env.example",deps:[],desc:"API_PORT and SERVER_PORT are undocumented fallback env vars read in wallet-action-shared.ts and install-plugin.ts. Meanwhile ELIZA_PORT defaults differently in dev-server.ts (31337) vs eliza.ts (2138). All port vars must be unified before other fixes can assume consistent config.",prompt:"Context: Milady — local-first AI assistant built on elizaOS. Stack: Bun, TypeScript.\n\nFiles:\n- src/actions/wallet-action-shared.ts:9-10 (reads API_PORT)\n- src/actions/install-plugin.ts:16 (reads SERVER_PORT)\n- src/runtime/dev-server.ts:30 (ELIZA_PORT defaults to 31337)\n- src/runtime/eliza.ts:537 (ELIZA_PORT defaults to 2138)\n- .env.example (missing entries)\n\nProblem:\nFour different env var names control port configuration, with undocumented fallbacks and inconsistent defaults. Devs cannot reliably set ports.\n\nFix:\n1. Deprecate API_PORT and SERVER_PORT — replace all usages with MILADY_PORT (or MILADY_API_PORT for the API server)\n2. Standardize defaults: API = 31337, UI = 2138\n3. Add all port vars to .env.example with comments\n4. Update CLAUDE.md port table to match\n\nAcceptance criteria:\n- grep -r 'API_PORT\\|SERVER_PORT' src/ returns zero hits (only MILADY_PORT/MILADY_API_PORT)\n- .env.example documents every port variable\n- Dev and prod use the same default ports"},
  {id:"T02",phase:0,severity:"MEDIUM",type:"LOGIC",domain:"CLI & Runtime",title:"Add MILADY_PORT and MILADY_API_PORT to BRAND_ENV_ALIASES",file:"src/config/brand-env.ts:7-23",deps:["T01"],desc:"BRAND_ENV_ALIASES maps MILADY_API_BIND→ELIZA_API_BIND but not the port vars. After T01 standardizes names, this ensures both MILADY_* and ELIZA_* variants work.",prompt:"Context: Milady — local-first AI assistant built on elizaOS. Stack: Bun, TypeScript.\n\nFile: src/config/brand-env.ts:7-23\n\nProblem:\nBRAND_ENV_ALIASES is missing port mappings. Setting MILADY_PORT or MILADY_API_PORT has no effect because they're never synced to ELIZA_PORT/ELIZA_API_PORT.\n\nFix:\nAdd to BRAND_ENV_ALIASES:\n  ['MILADY_PORT', 'ELIZA_PORT'],\n  ['MILADY_API_PORT', 'ELIZA_API_PORT'],\n  ['MILADY_BRIDGE_PORT', 'ELIZA_BRIDGE_PORT'],\n  ['MILADY_GATEWAY_PORT', 'ELIZA_GATEWAY_PORT']\n\nAcceptance criteria:\n- Setting MILADY_PORT=9000 results in ELIZA_PORT=9000 after brand-env sync\n- All four port aliases work bidirectionally\n- Existing MILADY_API_BIND alias still works"},
  {id:"T03",phase:0,severity:"HIGH",type:"ERROR",domain:"Environment & Ports",title:"Standardize MILADY_PORT to 2138 in all three Dockerfiles",file:"Dockerfile:183, Dockerfile.slim:339, Dockerfile.ci:56",deps:["T01"],desc:"Dockerfile.slim uses MILADY_PORT=3000 while others use 2138. This causes silent port mismatch across image variants.",prompt:"Context: Milady — local-first AI assistant. Stack: Docker.\n\nFiles: Dockerfile:183, Dockerfile.slim:339, Dockerfile.ci:56\n\nProblem:\nDockerfile.slim defaults MILADY_PORT=3000, main and CI default 2138. Deploying slim on same infra as main silently serves on wrong port.\n\nFix:\nSet ENV MILADY_PORT=2138 in all three Dockerfiles. If slim needs 3000, add a comment explaining why and update EXPOSE.\n\nAcceptance criteria:\n- grep 'MILADY_PORT' Dockerfile* shows 2138 in all three\n- EXPOSE directives match the port values\n- docker-compose.yml port mappings are consistent"},
  {id:"T04",phase:0,severity:"HIGH",type:"ERROR",domain:"Environment & Ports",title:"Standardize API bind env var to MILADY_API_BIND in all Dockerfiles",file:"Dockerfile:173, Dockerfile.slim:340, Dockerfile.ci:58",deps:["T02"],desc:"Dockerfile uses MILADY_API_BIND while slim/CI use ELIZA_API_BIND. Brand-env aliasing may not run early enough to sync them.",prompt:"Context: Milady — local-first AI assistant. Stack: Docker, TypeScript.\n\nFiles: Dockerfile:173, Dockerfile.slim:340, Dockerfile.ci:58\n\nProblem:\nDockerfile sets MILADY_API_BIND, slim/CI set ELIZA_API_BIND. If brand-env runs after bind check, slim/CI images may not bind to 0.0.0.0.\n\nFix:\nUse MILADY_API_BIND='0.0.0.0' in all three Dockerfiles.\n\nAcceptance criteria:\n- All Dockerfiles use MILADY_API_BIND consistently\n- API binds to 0.0.0.0 in all Docker variants\n- No silent binding failures"},
  {id:"T05",phase:0,severity:"HIGH",type:"ERROR",domain:"Environment & Ports",title:"Fix hardcoded gateway port 18789 in docker-compose command",file:"deploy/docker-compose.yml:16-17, 26-28",deps:["T02"],desc:"Port mapping uses ${MILADY_GATEWAY_PORT:-18789} but command argument hardcodes 18789. Setting a custom gateway port creates a mismatch.",prompt:"Context: Milady — local-first AI assistant. Stack: Docker.\n\nFile: deploy/docker-compose.yml:16-17 and 26-28\n\nProblem:\ndocker-compose.yml maps port via env var (correct) but hardcodes 18789 in the command argument (incorrect).\n\nFix:\nReplace hardcoded '18789' in command with ${MILADY_GATEWAY_PORT:-18789}.\n\nAcceptance criteria:\n- Gateway command uses ${MILADY_GATEWAY_PORT:-18789}\n- Setting MILADY_GATEWAY_PORT=19000 works end-to-end\n- Port mapping and process port are always consistent"},
  {id:"T06",phase:0,severity:"MEDIUM",type:"GAP",domain:"Electrobun Desktop App",title:"Extract DEFAULT_PORT into shared constants module",file:"apps/app/electrobun/src/native/agent.ts:47, apps/app/electrobun/src/api-base.ts:99",deps:[],desc:"Port 2138 is hardcoded in both agent.ts and api-base.ts without a shared source. Future changes require updating both files.",prompt:"Context: Milady — local-first AI assistant with Electrobun desktop app. Stack: TypeScript.\n\nFiles: apps/app/electrobun/src/native/agent.ts:47 and apps/app/electrobun/src/api-base.ts:99\n\nProblem:\nDEFAULT_PORT = 2138 defined in agent.ts, hardcoded separately in api-base.ts. They'll diverge.\n\nFix:\nCreate apps/app/electrobun/src/constants.ts exporting DEFAULT_PORT = 2138. Import in both files.\n\nAcceptance criteria:\n- Only one definition of DEFAULT_PORT exists\n- Both files import from shared constant\n- Port change requires editing one file only"},
  {id:"T07",phase:0,severity:"MEDIUM",type:"GAP",domain:"Environment & Ports",title:"Add MILADY_HOME_PORT env var override for home app dev port",file:"scripts/dev-ui.mjs:40-41",deps:[],desc:"Home app dev port 2142 is hardcoded with no environment variable fallback.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, Vite.\n\nFile: scripts/dev-ui.mjs:40-41\n\nProblem:\nAPP_UI_PORTS = { app: 2138, home: 2142 } hardcoded with no env var for home port.\n\nFix:\nRead from MILADY_HOME_PORT env var with 2142 default. Add to .env.example.\n\nAcceptance criteria:\n- MILADY_HOME_PORT=3000 starts home app on 3000\n- Default unchanged (2142)\n- Documented in .env.example"},

  // ── Phase 1: Critical Security Fixes ──
  {id:"T08",phase:1,severity:"HIGH",type:"SECURITY",domain:"Server & API",title:"Remove or restrict /api/plugins/:id/reveal — leaks all env secrets",file:"src/api/server.ts:1630-1645",deps:[],desc:"POST /api/plugins/:id/reveal returns raw process.env values including API keys and database passwords to any authenticated client. This is the most exploitable issue.",prompt:"Context: Milady — local-first AI assistant built on elizaOS. Stack: Bun, custom HTTP server, TypeScript.\n\nFile: src/api/server.ts:1630-1645\n\nProblem:\nPOST /api/plugins/:id/reveal returns raw process.env[key] values to any client with a valid API token. No allowlist restricts which vars can be revealed. Attacker with API token can exfiltrate all secrets.\n\nFix:\nEither (1) remove the /reveal endpoint entirely, or (2) add a strict allowlist of revealable keys (only non-secret plugin config), mask all others. Add audit logging.\n\nAcceptance criteria:\n- No raw secret values (API keys, DB passwords) returned by any endpoint\n- If allowlist: only listed keys returned; all others get 403\n- Audit log entry for every /reveal request"},
  {id:"T09",phase:1,severity:"HIGH",type:"SECURITY",domain:"Server & API",title:"Add authorization check to /api/database/tables/*/rows",file:"src/api/server.ts:1271-1422 (definition), 1647 (invocation)",deps:[],desc:"GET /api/database/tables/{table}/rows is called without ensureCompatApiAuthorized, allowing unauthenticated database reads when API_TOKEN is configured.",prompt:"Context: Milady — local-first AI assistant built on elizaOS. Stack: Bun, custom HTTP server, TypeScript.\n\nFile: src/api/server.ts:1271-1422 (definition), line 1647 (invocation)\n\nProblem:\nhandleDatabaseRowsCompatRoute is called without ensureCompatApiAuthorized. Other endpoints check auth but this one doesn't.\n\nFix:\nAdd ensureCompatApiAuthorized(req, res) at the start of handleDatabaseRowsCompatRoute. Return 401 if auth fails.\n\nAcceptance criteria:\n- /api/database/tables/*/rows without valid token returns 401\n- With valid token returns normal results\n- No regression in other database routes"},
  {id:"T10",phase:1,severity:"HIGH",type:"SECURITY",domain:"Main Web App",title:"Validate apiBase URL in detached shell mode before setting window global",file:"apps/app/src/main.tsx:530-535",deps:[],desc:"injectDetachedShellApiBase() accepts arbitrary URLs from query string without validation, unlike injectPopoutApiBase() which checks hostname/protocol. Attacker can redirect all API calls.",prompt:"Context: Milady — local-first AI assistant web app. Stack: React, Vite, TypeScript.\n\nFile: apps/app/src/main.tsx:530-535\n\nProblem:\ninjectDetachedShellApiBase() reads apiBase from URL params without validation. injectPopoutApiBase() validates protocol and hostname but this function doesn't. Crafted URL redirects API calls to attacker's server.\n\nFix:\nCopy validation logic from injectPopoutApiBase(): check protocol is http/https, hostname is localhost/127.0.0.1.\n\nAcceptance criteria:\n- Non-local apiBase values rejected with console warning\n- Detached shell still works with valid local API base\n- No XSS or SSRF via apiBase parameter"},
  {id:"T11",phase:1,severity:"HIGH",type:"SECURITY",domain:"Electrobun Desktop App",title:"Remove or restrict sandbox=\"\" on browser webview element",file:"apps/app/src/BrowserSurfaceWindow.tsx:184",deps:[],desc:"sandbox=\"\" on the electrobun-webview effectively disables all sandbox restrictions. Any loaded content gets full webview API access.",prompt:"Context: Milady — local-first AI assistant with Electrobun desktop app. Stack: React, Electrobun WebView.\n\nFile: apps/app/src/BrowserSurfaceWindow.tsx:184\n\nProblem:\nsandbox=\"\" disables all sandbox restrictions on the webview. Content has unrestricted access.\n\nFix:\nSet sandbox=\"allow-same-origin allow-scripts allow-forms\" or remove the attribute for default (most restrictive) sandboxing.\n\nAcceptance criteria:\n- WebView content cannot navigate top-level frame\n- WebView content cannot access parent window APIs unless explicitly allowed\n- Browsing functionality still works"},
  {id:"T12",phase:1,severity:"MEDIUM",type:"SECURITY",domain:"Server & API",title:"Replace manual SQL escaping with parameterized queries in search filter",file:"src/api/server.ts:1369-1383",deps:["T09"],desc:"Database rows search filter uses manual string escaping for ILIKE instead of parameterized queries. Incomplete escaping creates injection risk.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript, PostgreSQL.\n\nFile: src/api/server.ts:1369-1383\n\nProblem:\nManual string escaping for ILIKE patterns instead of parameterized queries.\n\nFix:\nReplace string concatenation with parameterized query: WHERE column ILIKE $1 with ['%' + searchTerm + '%'] as parameter.\n\nAcceptance criteria:\n- All SQL queries use parameterized placeholders\n- Search works with special characters (%, _, \\)\n- No SQL injection possible"},
  {id:"T13",phase:1,severity:"MEDIUM",type:"SECURITY",domain:"Electrobun Desktop App",title:"Stop exposing API token in renderer window globals",file:"apps/app/electrobun/src/bridge/electrobun-bridge.ts:320",deps:[],desc:"window.__MILADY_API_TOKEN__ is set as a regular global property accessible to any JS in the renderer. Malicious scripts or XSS can read it.",prompt:"Context: Milady — local-first AI assistant with Electrobun desktop app. Stack: TypeScript, Electrobun.\n\nFile: apps/app/electrobun/src/bridge/electrobun-bridge.ts:320\n\nProblem:\nwindow.__MILADY_API_TOKEN__ is a regular enumerable global property. Any renderer JS can read it.\n\nFix:\nUse Object.defineProperty with enumerable:false, configurable:false. Better: handle auth in main process and inject Authorization headers via preload.\n\nAcceptance criteria:\n- Token not readable by arbitrary renderer JS\n- API requests still include valid auth\n- Token not enumerable via Object.keys(window)"},
  {id:"T14",phase:1,severity:"MEDIUM",type:"SECURITY",domain:"Electrobun Desktop App",title:"Add auth token to Chrome extension WebSocket relay connection",file:"apps/chrome-extension/background.js:88",deps:[],desc:"Chrome extension connects to ws://127.0.0.1:{port}/extension without any authentication. Any local process can impersonate the relay.",prompt:"Context: Milady — Chrome extension. Stack: JavaScript, Chrome Extension APIs.\n\nFile: apps/chrome-extension/background.js:88\n\nProblem:\nWebSocket to ws://127.0.0.1:{port}/extension has no auth. Any local process on that port can impersonate the relay.\n\nFix:\nGenerate shared secret at install time, pass as query param, validate server-side.\n\nAcceptance criteria:\n- WebSocket includes auth token\n- Server rejects connections without valid token\n- Token not exposed to other extensions"},

  // ── Phase 2: Error Handling & Crash Prevention ──
  {id:"T15",phase:2,severity:"HIGH",type:"ERROR",domain:"Server & API",title:"Add try/catch to main route handler (handleMiladyCompatRoute call)",file:"src/api/server.ts:1694-1709",deps:[],desc:"Line 1703 calls await handleMiladyCompatRoute without try/catch. Unhandled throw crashes the server or leaves request hanging.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, custom HTTP server, TypeScript.\n\nFile: src/api/server.ts:1694-1709\n\nProblem:\nMain request handler at line 1703 calls await handleMiladyCompatRoute(req, res, state) without try/catch. Any throw crashes the server.\n\nFix:\nWrap in try/catch { res.writeHead(500); res.end(JSON.stringify({error:'Internal server error'})) }.\n\nAcceptance criteria:\n- Any throw returns HTTP 500 to client\n- Server does not crash from unhandled rejections\n- Error logged with stack trace"},
  {id:"T16",phase:2,severity:"HIGH",type:"ERROR",domain:"Server & API",title:"Fix unhandled stream error in onboarding body read",file:"src/api/server.ts:1513-1556",deps:[],desc:"POST /api/onboarding reads request chunks but only catches JSON parse errors, not stream read failures. Network interruption crashes the handler.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, custom HTTP server, TypeScript.\n\nFile: src/api/server.ts:1513-1556\n\nProblem:\nfor-await body reading loop only wraps JSON.parse in try/catch. Stream errors are unhandled.\n\nFix:\nWrap entire for-await-of loop in try/catch. On stream error, respond 400/500 and log.\n\nAcceptance criteria:\n- Network interruption returns proper error (not crash)\n- JSON parse errors still return 400\n- No unhandled promise rejections"},
  {id:"T17",phase:2,severity:"HIGH",type:"ERROR",domain:"Server & API",title:"Add error handling to /api/cloud/disconnect async operation",file:"src/api/cloud-routes.ts:177-188",deps:[],desc:"POST /api/cloud/disconnect calls await disconnectUnifiedCloudConnection without try-catch. Throws crash the handler.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript.\n\nFile: src/api/cloud-routes.ts:177-188\n\nProblem:\nawait disconnectUnifiedCloudConnection() without try-catch. Cloud disconnect failure crashes handler.\n\nFix:\nWrap in try-catch, return {ok: false, error: message} with HTTP 500.\n\nAcceptance criteria:\n- Cloud disconnect errors return HTTP 500\n- Server does not crash\n- Successful disconnect still returns 200"},
  {id:"T18",phase:2,severity:"HIGH",type:"ERROR",domain:"Electrobun Desktop App",title:"Handle _startAgent errors instead of void-discarding the promise",file:"apps/app/electrobun/src/index.ts:1320, 943-972",deps:[],desc:"void _startAgent(currentWindow) discards all errors. Agent startup failure leaves the renderer polling a dead port with no user feedback.",prompt:"Context: Milady — Electrobun desktop app. Stack: TypeScript, Electrobun, Bun.\n\nFile: apps/app/electrobun/src/index.ts:1320 and 943-972\n\nProblem:\nvoid _startAgent(currentWindow) discards the promise and errors. Startup failure leaves renderer spinning.\n\nFix:\nReplace void with .catch(err => { log.error(...); showNativeDialog('Agent failed to start: ' + err.message) }).\n\nAcceptance criteria:\n- Agent startup failure shows user-visible error\n- Error logged with full stack\n- App does not hang polling dead port"},
  {id:"T19",phase:2,severity:"MEDIUM",type:"ERROR",domain:"Server & API",title:"Save config to disk before mutating process.env",file:"src/api/server.ts:1240-1256",deps:[],desc:"Config update handler mutates process.env then calls saveElizaConfig. If save throws, env vars are modified but file is stale — restart reverts to old config.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript.\n\nFile: src/api/server.ts:1240-1256\n\nProblem:\nprocess.env mutated before saveElizaConfig(). Save failure leaves env modified but config file stale.\n\nFix:\nCall saveElizaConfig() first. Only mutate process.env on success. Wrap in try/catch with rollback.\n\nAcceptance criteria:\n- Failed save doesn't leave process.env modified\n- Successful save updates both consistently\n- Error returned to client on failure"},
  {id:"T20",phase:2,severity:"MEDIUM",type:"ERROR",domain:"Main Web App",title:"Add recovery mechanism to ErrorBoundary",file:"apps/app/src/ErrorBoundary.tsx:12-69",deps:[],desc:"ErrorBoundary catches errors but provides no recovery. Users stuck on error page even for transient failures. No 'try again' button.",prompt:"Context: Milady — local-first AI assistant web app. Stack: React, TypeScript.\n\nFile: apps/app/src/ErrorBoundary.tsx:12-69\n\nProblem:\nNo recovery path. Users must reload entire page for transient component errors.\n\nFix:\nAdd 'Try Again' button calling this.setState({ hasError: false, error: null }). Store error message for display.\n\nAcceptance criteria:\n- Error page has 'Try Again' button\n- Clicking re-renders child tree\n- Recurring error shows error page again"},
  {id:"T21",phase:2,severity:"MEDIUM",type:"LOGIC",domain:"Electrobun Desktop App",title:"Catch preload validation errors instead of crashing main process",file:"apps/app/electrobun/src/preload-validation.ts:39-65",deps:[],desc:"readBuiltPreloadScript throws if preload.js is missing/stale/empty, called during window creation. Crashes entire app with no error UI.",prompt:"Context: Milady — Electrobun desktop app. Stack: TypeScript, Electrobun.\n\nFile: apps/app/electrobun/src/preload-validation.ts:39-65\n\nProblem:\nThrows on missing/corrupt preload.js during window creation, crashing main process silently.\n\nFix:\nCatch errors in createMainWindow. Use stub preload or show native dialog on failure.\n\nAcceptance criteria:\n- Missing preload.js doesn't crash silently\n- User sees actionable error message\n- App can launch in degraded state"},

  // ── Phase 3: Logic & Race Conditions ──
  {id:"T22",phase:3,severity:"HIGH",type:"LOGIC",domain:"CLI & Runtime",title:"Unify conflicting SIGINT/SIGTERM signal handlers in startEliza",file:"src/runtime/eliza.ts:393-394, 560-561",deps:["T01"],desc:"Telegram bot registers process.once(SIGINT/SIGTERM) while cleanup registers process.on(). The once() handler fires first and may process.exit() before cleanup runs.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript, Node.js signals.\n\nFile: src/runtime/eliza.ts:393-394 and 560-561\n\nProblem:\nTwo separate signal handlers: process.once() for Telegram bot, process.on() for cleanup. once() fires first and may exit() before cleanup runs.\n\nFix:\nUnify into single cleanup function handling both bot shutdown and resource cleanup. Register once with process.on().\n\nAcceptance criteria:\n- Both bot shutdown and cleanup run on SIGINT/SIGTERM\n- No duplicate handler registration\n- Clean shutdown with proper resource release"},
  {id:"T23",phase:3,severity:"HIGH",type:"LOGIC",domain:"Server & API",title:"Fix race condition in wallet export nonce issuance",file:"src/api/wallet-export-guard.ts:124-147",deps:[],desc:"issueExportNonce iterates pendingExportNonces to count per-IP nonces, but concurrent calls can bypass the limit due to TOCTOU between count check and Map.set.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript, in-memory Maps.\n\nFile: src/api/wallet-export-guard.ts:124-147\n\nProblem:\nissueExportNonce iterates Map to count entries for IP, then adds new entry. Concurrent requests can both pass count check (TOCTOU race).\n\nFix:\nUse separate Map<string, number> for per-IP counters. Increment atomically — ensure no await between check and set.\n\nAcceptance criteria:\n- Concurrent nonce requests from same IP never exceed limit\n- Rate limiting works under parallel load\n- Existing nonce validation unaffected"},
  {id:"T24",phase:3,severity:"HIGH",type:"LOGIC",domain:"Plugins & Services",title:"Fix TOCTOU race in SandboxManager.exec() for containerId",file:"src/services/sandbox-manager.ts:341-367",deps:[],desc:"exec() checks this.containerId at line 341 but uses it at line 367. Concurrent stop() or recover() can null it between check and use.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript, Docker containers.\n\nFile: src/services/sandbox-manager.ts:341-367\n\nProblem:\nexec() checks this.containerId (line 341) then awaits before using it (line 367). stop() or recover() can null it between check and use.\n\nFix:\nCapture const id = this.containerId immediately after null check. Use id throughout the method.\n\nAcceptance criteria:\n- No null reference when exec() and stop() run concurrently\n- Container ID captured atomically\n- Non-concurrent paths unchanged"},
  {id:"T25",phase:3,severity:"HIGH",type:"LOGIC",domain:"Main Web App",title:"Add 'cloud' case to DetachedShellContent switch statement",file:"apps/app/src/DetachedShellRoot.tsx:84-105",deps:[],desc:"DetachedSurfaceTab type includes 'cloud' but the switch is missing that case. Navigating to cloud tab renders blank screen.",prompt:"Context: Milady — local-first AI assistant web app. Stack: React, TypeScript.\n\nFile: apps/app/src/DetachedShellRoot.tsx:84-105\n\nProblem:\nSwitch handling DetachedSurfaceTab values is missing 'cloud' case. Type allows it but runtime doesn't handle it — blank screen.\n\nFix:\nAdd case 'cloud': return <CloudDashboard />; and default: case with error message. Use satisfies never for exhaustiveness.\n\nAcceptance criteria:\n- Cloud tab renders CloudDashboard\n- Unknown tabs render error message\n- TypeScript compiler enforces exhaustive switch"},
  {id:"T26",phase:3,severity:"MEDIUM",type:"LOGIC",domain:"Electrobun Desktop App",title:"Fix race between API base injection and agent startup",file:"apps/app/electrobun/src/index.ts:417-429, 1296-1320",deps:["T18"],desc:"Agent starts asynchronously while renderer is already mounting and fetching /api/auth/status. Early requests fail and may cache null/error state.",prompt:"Context: Milady — Electrobun desktop app. Stack: TypeScript, Electrobun.\n\nFile: apps/app/electrobun/src/index.ts:417-429, 1296-1320\n\nProblem:\nAgent starts asynchronously (void _startAgent) while renderer already fetching API. Early requests fail, renderer caches error state.\n\nFix:\nEither await _startAgent before loading renderer, or add retry with exponential backoff in renderer's API client.\n\nAcceptance criteria:\n- Renderer never displays stale auth state\n- Loading state shown until agent health check passes\n- No race between agent startup and first API call"},
  {id:"T27",phase:3,severity:"MEDIUM",type:"LOGIC",domain:"Server & API",title:"Return proper HTTP error codes from POST /api/plugins/:id/test",file:"src/api/server.ts:1598-1628",deps:[],desc:"When plugin test fails, returns HTTP 200 with success:false. Clients checking status codes cannot detect failures.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript.\n\nFile: src/api/server.ts:1598-1628\n\nProblem:\nPOST /api/plugins/:id/test returns HTTP 200 when success: false. Clients can't detect failure by status code.\n\nFix:\nReturn HTTP 500 when success: false. Keep same JSON body structure.\n\nAcceptance criteria:\n- Failed tests return 4xx/5xx\n- Successful tests return 200\n- Response body unchanged"},
  {id:"T28",phase:3,severity:"MEDIUM",type:"LOGIC",domain:"Environment & Ports",title:"Add BRIDGE_PORT to BRAND_ENV_ALIASES",file:"src/config/brand-env.ts:6-20, deploy/cloud-agent-shared.ts:62",deps:["T02"],desc:"cloud-agent-shared.ts reads process.env.BRIDGE_PORT directly without checking MILADY_BRIDGE_PORT. Not aliased in brand-env.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, TypeScript.\n\nFile: src/config/brand-env.ts:6-20 and deploy/cloud-agent-shared.ts:62\n\nProblem:\nBRIDGE_PORT not aliased. MILADY_BRIDGE_PORT has no effect.\n\nFix:\nAdd ['MILADY_BRIDGE_PORT', 'ELIZA_BRIDGE_PORT'] to BRAND_ENV_ALIASES. (Can be done in T02 if combined.)\n\nAcceptance criteria:\n- MILADY_BRIDGE_PORT and ELIZA_BRIDGE_PORT interchangeable\n- cloud-agent-shared.ts picks up either variant"},

  // ── Phase 4: Build & Deploy Consistency ──
  {id:"T29",phase:4,severity:"MEDIUM",type:"LOGIC",domain:"Build & Config",title:"Add patch-deps and link-browser-server steps to Dockerfile.slim",file:"Dockerfile:127-128, Dockerfile.slim:61-62",deps:["T03","T04"],desc:"Dockerfile.slim skips critical patches that main Dockerfile runs. Missing bun exports patch causes runtime plugin resolution failures.",prompt:"Context: Milady — local-first AI assistant. Stack: Docker, Bun.\n\nFiles: Dockerfile:127-128, Dockerfile.slim:61-62\n\nProblem:\nDockerfile.slim skips link-browser-server.mjs and patch-deps.mjs that main Dockerfile runs. CLAUDE.md documents patch-deps as critical.\n\nFix:\nAdd RUN node ./scripts/link-browser-server.mjs && node ./scripts/patch-deps.mjs to Dockerfile.slim before tsdown build.\n\nAcceptance criteria:\n- Slim image runs patch-deps before building\n- Plugin resolution works in slim image\n- No runtime errors from missing patches"},
  {id:"T30",phase:4,severity:"MEDIUM",type:"LOGIC",domain:"Build & Config",title:"Standardize build scripts to use same package manager",file:"package.json:61-62",deps:[],desc:"'build' script uses bun while 'build:node' uses npm for same target. Different package managers may produce inconsistent builds.",prompt:"Context: Milady — local-first AI assistant. Stack: Bun, npm.\n\nFile: package.json:61-62\n\nProblem:\n'build' uses bun, 'build:node' uses npm for same target (apps/app). Inconsistent builds.\n\nFix:\nUse bun in both, or document why npm is needed for build:node.\n\nAcceptance criteria:\n- Both scripts produce identical output\n- CI uses same command as local dev"},

  // ── Phase 5: UX Polish ──
  {id:"T31",phase:5,severity:"MEDIUM",type:"UX",domain:"Electrobun Desktop App",title:"Queue critical messages in sendToActiveRenderer when no window is open",file:"apps/app/electrobun/src/index.ts:358-360",deps:["T18"],desc:"sendToActiveRenderer silently drops all messages when no window is open. Agent status updates and menu actions are lost without logging or queuing.",prompt:"Context: Milady — Electrobun desktop app. Stack: TypeScript, Electrobun.\n\nFile: apps/app/electrobun/src/index.ts:358-360\n\nProblem:\nsendToActiveRenderer uses optional chaining, silently dropping messages when no window is open.\n\nFix:\nLog dropped messages. Queue critical ones (agent status) for replay on window open.\n\nAcceptance criteria:\n- Dropped messages logged at debug level\n- Critical messages queued and replayed\n- No console spam for expected drops"},
  {id:"T32",phase:5,severity:"LOW",type:"UX",domain:"Main Web App",title:"Add Vite proxy error handling for offline API server in dev mode",file:"apps/app/vite.config.ts:250-258",deps:[],desc:"Vite dev server proxies /api and /ws to localhost API without error handling. If API is offline, requests hang with unclear errors.",prompt:"Context: Milady — local-first AI assistant web app. Stack: Vite, TypeScript.\n\nFile: apps/app/vite.config.ts:250-258\n\nProblem:\nVite proxy for /api has no error handling for offline API server. Requests hang.\n\nFix:\nAdd custom middleware detecting API unavailability, return clear error response or add client-side retry.\n\nAcceptance criteria:\n- Dev mode shows clear error when API is offline\n- No indefinite hanging requests\n- API reconnects automatically when server starts"}
];

// ═══════════════════════════════════════════════════════════════════
//  PHASE METADATA
// ═══════════════════════════════════════════════════════════════════
const PHASES = [
  {id:0,name:"Phase 0: Config Alignment",desc:"Unify ports, env vars, and Docker defaults. These are foundational — later phases assume consistent config.",color:"var(--purple)"},
  {id:1,name:"Phase 1: Security",desc:"Patch auth bypasses, secret leaks, sandboxing, and injection risks. These are actively exploitable.",color:"var(--pink)"},
  {id:2,name:"Phase 2: Error Handling",desc:"Add crash prevention: try/catch wrappers, error boundaries, startup failure handling.",color:"var(--red)"},
  {id:3,name:"Phase 3: Logic & Races",desc:"Fix race conditions, signal handler conflicts, TOCTOU bugs, and missing switch cases.",color:"var(--blue)"},
  {id:4,name:"Phase 4: Build & Deploy",desc:"Ensure Docker images, build scripts, and patching are consistent across variants.",color:"var(--orange)"},
  {id:5,name:"Phase 5: UX Polish",desc:"Improve message queuing, dev mode error feedback, and minor edge cases.",color:"var(--green)"}
];

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let activePhase = -1; // -1 = all
let checked = {};
try { checked = JSON.parse(localStorage.getItem("milady-tg-checked")||"{}"); } catch(e){}
function saveChecked(){ try{localStorage.setItem("milady-tg-checked",JSON.stringify(checked))}catch(e){} }

function isDone(id){ return !!checked[id] }
function depsReady(t){ return t.deps.every(d => isDone(d)) }

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function updateProgress(){
  const done = TASKS.filter(t=>isDone(t.id)).length;
  document.getElementById("pbar").style.width = (done/TASKS.length*100)+"%";
  document.getElementById("plabel").textContent = done+" / "+TASKS.length+" complete";
}

function renderNav(){
  const el = document.getElementById("phase-nav");
  let html = `<div class="phase-tab ${activePhase===-1?'active':''}" onclick="setPhase(-1)">All Tasks<span class="cnt">${TASKS.length}</span></div>`;
  PHASES.forEach(p => {
    const cnt = TASKS.filter(t=>t.phase===p.id).length;
    const done = TASKS.filter(t=>t.phase===p.id&&isDone(t.id)).length;
    html += `<div class="phase-tab ${activePhase===p.id?'active':''}" onclick="setPhase(${p.id})">P${p.id}${done===cnt?' ✓':''}<span class="cnt">${done}/${cnt}</span></div>`;
  });
  el.innerHTML = html;
}

function setPhase(p){ activePhase=p; renderNav(); renderContent(); }

function renderContent(){
  const el = document.getElementById("main-content");
  if(activePhase===-1){ renderAllPhases(el); return; }
  const phase = PHASES[activePhase];
  const tasks = TASKS.filter(t=>t.phase===activePhase);
  el.innerHTML = `<div class="content"><div class="phase-header"><h2 style="color:${phase.color}">${phase.name}</h2><p class="phase-desc">${phase.desc}</p>${activePhase>0?`<p class="dep-note">Depends on Phase ${activePhase-1} tasks being complete where noted</p>`:''}</div>${tasks.map(renderTask).join("")}</div>`;
}

function renderAllPhases(el){
  let html = '<div class="dag-view">';
  PHASES.forEach(p => {
    const tasks = TASKS.filter(t=>t.phase===p.id);
    html += `<div class="dag-phase-group"><div class="dag-phase-label" style="color:${p.color}">${p.name} <span style="color:var(--muted);font-weight:400;font-size:12px">(${tasks.filter(t=>isDone(t.id)).length}/${tasks.length})</span></div>${tasks.map(renderTask).join("")}</div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderTask(t){
  const done = isDone(t.id);
  const ready = depsReady(t);
  const sevClass = done ? 'done' : `sev-${t.severity}`;
  const depsHtml = t.deps.length ? `<div class="task-deps"><span class="dep-label">needs:</span>${t.deps.map(d=>`<span class="dep-tag" onclick="scrollToTask('${d}')">${d}</span>`).join("")}</div>` : '';
  return `<div class="task ${sevClass} ${done?'done':''}" id="task-${t.id}">
    <div class="task-row">
      <input type="checkbox" ${done?'checked':''} ${!ready&&!done?'title="Dependencies not yet complete"':''} onchange="toggleTask('${t.id}',this)">
      <div class="task-meta">
        <div class="task-id">${t.id}</div>
        <div class="task-title">${t.title}</div>
        <div class="task-badges">
          <span class="badge b-${t.severity}">${t.severity}</span>
          <span class="badge b-${t.type}">${t.type}</span>
          <span class="badge b-domain">${t.domain}</span>
        </div>
        <div class="task-file">${t.file}</div>
        ${depsHtml}
      </div>
    </div>
    <div class="task-desc">${t.desc}</div>
    <div class="fix-toggle" onclick="toggleFix(this)"><span class="arrow">▶</span> Fix Prompt</div>
    <div class="fix-box"><pre>${escHtml(t.prompt)}</pre><button class="copy-btn" onclick="copyPrompt(this,event)">Copy</button></div>
  </div>`;
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function toggleTask(id,cb){
  checked[id]=cb.checked;
  saveChecked();
  updateProgress();
  renderNav();
  renderContent();
}

function toggleFix(el){
  el.classList.toggle("open");
  el.nextElementSibling.classList.toggle("open");
}

function copyPrompt(btn,e){
  e.stopPropagation();
  const pre=btn.previousElementSibling;
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    btn.textContent="Copied ✓";btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="Copy";btn.classList.remove("copied")},2000);
  });
}

function scrollToTask(id){
  const el=document.getElementById("task-"+id);
  if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.outline="2px solid var(--accent)";setTimeout(()=>el.style.outline="",2000)}
}

// Init
renderNav();
renderContent();
updateProgress();
</script>
</body>
</html>
